<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baton</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg: #fff;
  --surface: #fafafa;
  --text: #111;
  --muted: #555;
  --border: #d6d6d6;
  --success: #2d7a3a;
  --warning: #a67c00;
  --danger: #b33;
  --accent: #000;
}

body {
  font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
  color: var(--text);
  background: var(--bg);
  padding: 2rem 3vw;
  line-height: 1.5;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.header h1 {
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.header .domain {
  font-size: 0.9rem;
  color: var(--muted);
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 2.5rem;
}

@media (max-width: 800px) {
  .grid { grid-template-columns: 1fr; }
}

.eyebrow {
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
}

.services {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.service {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 1.5rem;
  align-items: center;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
}

.service:first-child {
  padding-top: 0;
}

.service-name {
  font-weight: 600;
  font-size: 0.95rem;
}

.service-meta {
  font-size: 0.85rem;
  color: var(--muted);
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
  margin-top: 0.2rem;
}

.service-type {
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.2rem 0.5rem;
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
}

.service-status {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.85rem;
  font-weight: 600;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}

.dot-running { background: var(--success); }
.dot-pending { background: var(--warning); }
.dot-restarting { background: var(--warning); }
.dot-crashed { background: var(--danger); }
.dot-failed { background: var(--danger); }
.dot-stopped { background: var(--muted); }
.dot-scheduled { background: var(--muted); }

.status-running { color: var(--success); }
.status-pending { color: var(--warning); }
.status-restarting { color: var(--warning); }
.status-crashed { color: var(--danger); }
.status-failed { color: var(--danger); }
.status-stopped { color: var(--muted); }
.status-scheduled { color: var(--muted); }

.restarts {
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
}

.sidebar section {
  margin-bottom: 2rem;
}

.sidebar section:last-child {
  margin-bottom: 0;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.stat {
  padding: 0.75rem 0;
  border-bottom: 1px solid var(--border);
}

.stat:nth-child(odd) {
  padding-right: 1rem;
}

.stat:nth-child(even) {
  padding-left: 1rem;
  border-left: 1px solid var(--border);
}

.stat-value {
  font-size: 1.4rem;
  font-weight: 600;
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.empty {
  color: var(--muted);
  font-style: italic;
  font-size: 0.9rem;
}

.updated {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: right;
  margin-top: 2rem;
  font-family: 'Iosevka Term', 'IBM Plex Mono', 'Cascadia Code', monospace;
}
</style>
</head>
<body>

<div class="header">
  <h1>Baton</h1>
  <span class="domain" id="domain"></span>
</div>

<div class="grid">
  <div class="main">
    <div class="eyebrow">Services</div>
    <div class="services" id="services">
      <div class="empty">connecting...</div>
    </div>
  </div>

  <div class="sidebar">
    <section>
      <div class="eyebrow">Overview</div>
      <div class="stat-grid" id="stats">
        <div class="stat">
          <div class="stat-value" id="total">0</div>
          <div class="stat-label">services</div>
        </div>
        <div class="stat">
          <div class="stat-value status-running" id="running">0</div>
          <div class="stat-label">running</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="restarts-total">0</div>
          <div class="stat-label">restarts</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="uptime">0s</div>
          <div class="stat-label">uptime</div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="updated" id="updated"></div>

<script>
const startTime = Date.now();

function statusClass(status) {
  const s = (status || 'running').toLowerCase();
  if (s === 'running') return 'running';
  if (s === 'restarting' || s === 'pending' || s === 'starting') return 'restarting';
  if (s === 'crashed' || s === 'failed') return 'crashed';
  if (s === 'stopped') return 'stopped';
  if (s === 'scheduled') return 'scheduled';
  return 'running';
}

function formatUptime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function render(data) {
  document.getElementById('domain').textContent = data.domain || '';

  const svcs = data.services || [];
  const container = document.getElementById('services');

  if (svcs.length === 0) {
    container.innerHTML = '<div class="empty">no services configured</div>';
  } else {
    container.innerHTML = svcs.map(function(svc) {
      var sc = statusClass(svc.status);
      var port = svc.port ? ':' + svc.port : '';
      var restartLabel = svc.restarts > 0 ? '<span class="restarts">' + svc.restarts + ' restarts</span>' : '';

      return '<div class="service">' +
        '<div><div class="service-name">' + svc.name + '</div>' +
        '<div class="service-meta">' + svc.detail + (port ? ' ' + port : '') + '</div>' +
        restartLabel +
        '</div>' +
        '<span class="service-type">' + svc.kind + '</span>' +
        '<div class="service-status status-' + sc + '"><span class="dot dot-' + sc + '"></span>' + svc.status + '</div>' +
        '</div>';
    }).join('');
  }

  var total = svcs.length;
  var runningCount = svcs.filter(function(s) { return s.status === 'running'; }).length;
  var totalRestarts = svcs.reduce(function(sum, s) { return sum + (s.restarts || 0); }, 0);

  document.getElementById('total').textContent = total;
  document.getElementById('running').textContent = runningCount;
  document.getElementById('restarts-total').textContent = totalRestarts;
  document.getElementById('uptime').textContent = formatUptime(Date.now() - startTime);

  document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
}

async function poll() {
  try {
    var resp = await fetch('/api/status');
    if (resp.ok) {
      var data = await resp.json();
      render(data);
    }
  } catch (e) {
    // ignore fetch errors
  }
}

poll();
setInterval(poll, 2000);
setInterval(function() {
  document.getElementById('uptime').textContent = formatUptime(Date.now() - startTime);
}, 1000);
</script>

</body>
</html>
